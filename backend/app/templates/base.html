<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HomeSec{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">🛡 HomeSec</span>
  <a href="/" class="{{ 'on' if active == 'dashboard' }}">Обзор</a>
  <a href="/devices" class="{{ 'on' if active == 'devices' }}">Устройства</a>
  <a href="/people" class="{{ 'on' if active == 'people' }}">Пользователи</a>
  <a href="/rules" class="{{ 'on' if active == 'rules' }}">Правила</a>
  <a href="/events" class="{{ 'on' if active == 'events' }}">Журнал</a>
  <form method="post" action="/logout" class="logout"><button>Выйти</button></form>
</nav>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
