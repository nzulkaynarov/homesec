# Конфиг линтеров. Сами инструменты — dev-зависимости (ставятся в CI),
# в requirements.txt их нет, чтобы не тащить на малинку лишнее.

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle
    "F",  # pyflakes
    "W",  # предупреждения pycodestyle
    "I",  # сортировка импортов
    "UP", # устаревшие конструкции (pyupgrade)
    "B",  # типичные ловушки (bugbear)
]
# B008: Depends(...)/Form(...) в значениях по умолчанию — идиома FastAPI
ignore = ["B008"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
